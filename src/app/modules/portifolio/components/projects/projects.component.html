<div class="containe">
    <h2>"Projects"</h2>
    <ul>
        @for(project of projects(); track project.src) {
            <li>
                <button>
                    <img [src]="project.src" [alt]="project.alt" [attr.width]="project.width" [attr.height]="project.height" />
                </button>
            </li>
        }
    </ul>
</div>
